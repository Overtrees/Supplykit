<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupplyChain V1</title>
    <style>
      *{box-sizing:border-box}
      .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:16px}
      .muted{color:#64748b}.small{font-size:12px}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:12px;font-weight:600}
      .warning{background:#fffbeb;color:#b45309}.success{background:#ecfdf5;color:#059669}.danger{background:#fff1f2;color:#e11d48}.info{background:#eff6ff;color:#1d4ed8}
      .section-title{font-weight:700;margin-bottom:12px;font-size:15px}
      table{width:100%;border-collapse:collapse}
      th{text-align:left;font-size:12px;color:#64748b;border-bottom:1px solid #e5e7eb;padding:8px 0}
      td{padding:8px 0;border-bottom:1px solid #f1f5f9;vertical-align:top}
      .step-indicator{display:flex;gap:24px;margin-bottom:20px;padding:12px 20px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;font-size:13px}
      .step{color:#94a3b8;font-weight:500}.step.active{color:#1d4ed8;font-weight:700}.step.done{color:#059669}
      .mapping-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid #f1f5f9;border-radius:10px;margin-bottom:6px;background:#fff}
      .mapping-row:hover{border-color:#cbd5e1;background:#fafafa}
      .mapping-src{flex:1;font-size:13px;font-weight:500;min-width:0;word-break:break-all}
      .mapping-arrow{color:#94a3b8;font-size:12px;flex-shrink:0}
      .mapping-dst{flex:1}
      .mapping-dst select{width:100%;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;outline:none}
      .mapping-dst select:focus{border-color:#3b82f6}
      .mapping-type{width:90px;flex-shrink:0}
      .mapping-type select{width:100%;font-size:11px;padding:5px;border:1px solid #e2e8f0;border-radius:6px;background:#fff}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
