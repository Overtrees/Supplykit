<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>SupplyChain V1</title>
    <style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#1d4ed8;--success:#059669;--danger:#e11d48;--warning:#f59e0b;--info:#0f766e;--sidebar:#1e293b;--bg:#f8fafc;--card:#fff;--border:#e5e7eb;--text:#0f172a;--muted:#64748b;--muted2:#94a3b8}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;margin:0;padding:0;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}.muted{color:var(--muted)}.small{font-size:12px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;min-height:26px;line-height:20px}.warning{background:#fffbeb;color:#b45309}.success{background:#ecfdf5;color:var(--success)}.danger{background:#fff1f2;color:var(--danger)}.info{background:#eff6ff;color:var(--primary)}.section-title{font-weight:700;margin-bottom:12px;font-size:15px}
table{width:100%;border-collapse:collapse}th{text-align:left;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);padding:10px 4px;white-space:nowrap}td{padding:10px 4px;border-bottom:1px solid #f1f5f9;vertical-align:top;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:44px}td.mono{max-width:140px}.col-sku{max-width:120px}.col-name{max-width:220px}.col-store{max-width:80px}.col-price{max-width:90px;text-align:right}.col-qty{max-width:60px;text-align:center}.col-date{max-width:100px;white-space:nowrap}tr:hover td{background:#f8fafc}tbody tr:nth-child(even) td{background:#fafbfc}tbody tr:nth-child(even):hover td{background:#f1f5f9}
.btn{padding:8px 16px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:all .1s;min-height:40px}.btn-primary{background:var(--primary);color:#fff}.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
input,select,button,textarea{font-family:inherit}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
