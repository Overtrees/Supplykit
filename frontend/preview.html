<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SupplyChain V1 Preview</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#f3f6fb;font-family:system-ui,sans-serif;color:#0f172a}
    .wrap{max-width:1280px;margin:0 auto;padding:20px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
    .grid22{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:16px;box-shadow:0 6px 18px rgba(15,23,42,.04)}
    .muted{color:#64748b}.small{font-size:12px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
    .warning{background:#fffbeb;color:#b45309}.success{background:#ecfdf5;color:#059669}.danger{background:#fff1f2;color:#e11d48}.info{background:#eff6ff;color:#1d4ed8}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:12px;color:#64748b;border-bottom:1px solid #e5e7eb;padding:8px 0}
    td{padding:8px 0;border-bottom:1px solid #f1f5f9;vertical-align:top}
    .header{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff}
    .header .muted{color:#cbd5e1}.section-title{font-weight:700;margin-bottom:12px;font-size:15px}
    @media(max-width:900px){.grid4,.grid2,.grid22,.grid3{grid-template-columns:1fr}}
    .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:999;opacity:0;pointer-events:none;transition:opacity 0.25s ease}
    .sidebar-overlay.open{opacity:1;pointer-events:auto}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:#1e293b;color:#fff;z-index:1000;transform:translateX(-100%);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;overflow:hidden}
    .sidebar.open{transform:translateX(0)}
    .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
    .sidebar-logo{display:flex;align-items:center;gap:10px}
    .sidebar-logo-icon{width:32px;height:32px;border-radius:8px;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
    .sidebar-logo-text{font-weight:700;font-size:16px;letter-spacing:-0.02em}
    .sidebar-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:none;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);font-size:16px;transition:all 0.15s}
    .sidebar-close:hover{background:rgba(255,255,255,0.15);color:#fff}
    .sidebar-nav{flex:1;overflow-y:auto;padding:12px 8px}
    .sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 16px;margin:2px 4px;border-radius:10px;cursor:pointer;font-size:14px;transition:all 0.12s;color:rgba(255,255,255,0.65)}
    .sidebar-item:hover{background:rgba(255,255,255,0.08);color:#fff}
    .sidebar-item.active{background:rgba(59,130,246,0.2);color:#fff;font-weight:600}
    .sidebar-item-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
    .sidebar-item-badge{margin-left:auto;font-size:10px;border-radius:99px;padding:1px 7px;min-width:18px;text-align:center}
    .sidebar-item-badge.red{background:#ef4444;color:#fff}
    .sidebar-item-badge.amber{background:#f59e0b;color:#fff}
    .menu-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:none;background:rgba(255,255,255,0.12);color:#fff;font-size:18px;transition:all 0.15s;margin-right:10px;flex-shrink:0}
    .menu-btn:hover{background:rgba(255,255,255,0.2)}
    .mapping-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid #f1f5f9;border-radius:10px;margin-bottom:6px;background:#fff;transition:all 0.12s}
    .mapping-row:hover{border-color:#cbd5e1;background:#fafafa}
    .mapping-src{flex:1;font-size:13px;font-weight:500;min-width:0;word-break:break-all}
    .mapping-arrow{color:#94a3b8;font-size:12px;flex-shrink:0}
    .mapping-dst{flex:1}
    .mapping-dst select{width:100%;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;outline:none}
    .mapping-dst select:focus{border-color:#3b82f6}
    .mapping-type{width:90px;flex-shrink:0}
    .mapping-type select{width:100%;font-size:11px;padding:5px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;outline:none}
    .step-indicator{display:flex;gap:6px;margin-bottom:16px}
    .step{font-size:11px;padding:4px 12px;border-radius:99px;background:#f1f5f9;color:#94a3b8;font-weight:500}
    .step.active{background:#1d4ed8;color:#fff}
    .step.done{background:#ecfdf5;color:#059669}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState, useCallback } = React
    const API = 'https://overtrees.pythonanywhere.com'

    const NAV = [
      { id:'dash',    label:'总览',     icon:'📊' },
      { id:'products',label:'商品',     icon:'🏷️' },
      { id:'suppliers',label:'供应商',  icon:'🏭' },
      { id:'orders',  label:'订单',     icon:'📋' },
      { id:'inv',     label:'库存',     icon:'📦' },
      { id:'insights',label:'建议',     icon:'💡' },
      { id:'cleansing',label:'清洗',   icon:'🧹' },
      { id:'import',  label:'导入数据', icon:'📤' },
      { id:'quality', label:'异常',     icon:'⚠️' },
    ]

    const { Card, Chart, levelClass } = (() => {
      function Card({ title, value, sub, badge }) {
        return <div className="card"><div style={{display:'flex',justifyContent:'space-between',gap:8}}><div className="small muted">{title}</div>{badge || null}</div><div style={{fontSize:28,fontWeight:700,marginTop:6}}>{value}</div>{sub ? <div className="small muted" style={{marginTop:4}}>{sub}</div> : null}</div>
      }
      function Chart({ option, height=260 }) {
        var inst = null
        var bind = function(el) {
          if (!el) {
            if (inst) {
              window.removeEventListener('resize', inst._rz)
              inst.dispose()
              inst = null
            }
            return
          }
          if (!window.echarts) return
          var existing = echarts.getInstanceByDom(el)
          if (existing) existing.dispose()
          inst = echarts.init(el)
          setTimeout(function() { try{inst.setOption(option)}catch(e){console.error('Chart err:',e)} }, 0)
          inst._rz = function() { inst.resize() }
          window.addEventListener('resize', inst._rz)
        }
        return <div ref={bind} style={{width:'100%',height}} />
      }
      function levelClass(level) {
        if (level === 'error') return 'danger'
        if (level === 'warning') return 'warning'
        if (level === 'success') return 'success'
        return 'info'
      }
      return { Card, Chart, levelClass }
    })()

    // ─── 侧边栏 ─────────────────────────────────────────────────────────────
    function Sidebar({ open, onClose, page, onNavigate, lowStock, errCount }) {
      return <>
        <div className={`sidebar-overlay${open ? ' open' : ''}`} onClick={onClose} />
        <div className={`sidebar${open ? ' open' : ''}`}>
          <div className="sidebar-header">
            <div className="sidebar-logo">
              <div className="sidebar-logo-icon">供</div>
              <span className="sidebar-logo-text">SupplyChain</span>
            </div>
            <button className="sidebar-close" onClick={onClose}>✕</button>
          </div>
          <div className="sidebar-nav">
            {NAV.map(item => {
              const active = page === item.id
              let badge = null
              if (item.id === 'quality' && errCount > 0) badge = <span className="sidebar-item-badge red">{errCount}</span>
              if (item.id === 'inv' && lowStock > 0) badge = <span className="sidebar-item-badge amber">{lowStock}</span>
              return (
                <div key={item.id} className={`sidebar-item${active ? ' active' : ''}`} onClick={() => { onNavigate(item.id); onClose() }}>
                  <span className="sidebar-item-icon">{item.icon}</span>
                  <span>{item.label}</span>
                  {badge}
                </div>
              )
            })}
          </div>
        </div>
      </>
    }

    // ─── 清洗页面 ────────────────────────────────────────────────────────────
    function CleansingPage() {
      const [step, setStep] = useState(0) // 0=上传 1=映射 2=预览 3=完成
      const [file, setFile] = useState(null)
      const [columns, setColumns] = useState([])
      const [totalRows, setTotalRows] = useState(0)
      const [targetType, setTargetType] = useState('order')
      const [mapping, setMapping] = useState({}) // { sourceCol: { target, type, format, default } }
      const [systemFields, setSystemFields] = useState([])
      const [preview, setPreview] = useState(null)
      const [templates, setTemplates] = useState([])
      const [templateName, setTemplateName] = useState('')
      const [result, setResult] = useState(null)
      const [busy, setBusy] = useState('')
      const [showFieldForm, setShowFieldForm] = useState(false)
      const [newFieldKey, setNewFieldKey] = useState('')
      const [newFieldLabel, setNewFieldLabel] = useState('')
      const [newFieldType, setNewFieldType] = useState('string')

      // STEP 1: 上传检测
      const handleUpload = async (f) => {
        if (!f) return
        setFile(f)
        setBusy('detect')
        try {
          const form = new FormData(); form.append('file', f)
          const res = await fetch(API+'/api/cleansing/detect', { method:'POST', body:form })
          const data = await res.json()
          if (data.ok) {
            setColumns(data.columns)
            setTotalRows(data.total)
            // 初始映射：source→空
            const m = {}
            data.columns.forEach(c => { m[c.name] = { target:'', type:'string', format:'', default:'' } })
            setMapping(m)
            // 加载系统字段
            const sysRes = await fetch(API+'/api/cleansing/fields/'+targetType)
            const sysData = await sysRes.json()
            setSystemFields(sysData.all || sysData)
            // 加载已有模板
            await loadTemplates()
            setStep(1)
          }
        } finally { setBusy('') }
      }

      // 加载模板列表
      const loadTemplates = async () => {
        try {
          const res = await fetch(API+'/api/cleansing/templates')
          const data = await res.json()
          setTemplates(data)
        } catch(e) {}
      }

      // 切换目标类型时刷新字段
      const switchTarget = async (t) => {
        setTargetType(t)
        const res = await fetch(API+'/api/cleansing/fields/'+t)
        const data = await res.json()
        setSystemFields(data.all || data)
      }

      // 更新映射
      const updateMapping = (src, key, val) => {
        setMapping(prev => ({ ...prev, [src]: { ...prev[src], [key]: val } }))
      }

      // 应用模板
      const applyTemplate = (tpl) => {
        if (!tpl.mapping) return
        setMapping(prev => {
          const m = { ...prev }
          Object.keys(tpl.mapping).forEach(k => {
            if (m[k]) m[k] = { ...m[k], ...tpl.mapping[k] }
          })
          return m
        })
      }

      // STEP 2→3: 预览
      const handlePreview = async () => {
        if (!file) return
        setBusy('preview')
        const form = new FormData(); form.append('file', file)
        form.append('mapping', JSON.stringify(mapping))
        try {
          const res = await fetch(API+'/api/cleansing/preview', { method:'POST', body:form })
          const data = await res.json()
          if (data.ok) { setPreview(data); setStep(2) }
        } finally { setBusy('') }
      }

      // STEP 3→4: 执行
      const handleExecute = async () => {
        if (!file) return; setBusy('exec')
        const form = new FormData(); form.append('file', file)
        form.append('mapping', JSON.stringify(mapping))
        form.append('target', targetType)
        form.append('template_name', templateName)
        try {
          const res = await fetch(API+'/api/cleansing/execute-async', { method:'POST', body:form })
          if (!res.ok) { alert('提交失败: '+res.status); setBusy(''); return }
          const d = await res.json()
          if (!d.ok) { alert(d.error||'提交失败'); setBusy(''); return }
          const tid = d.task_id; setBusy('polling')
          const poll = setInterval(async () => {
            try {
              const sr = await fetch(API+'/api/cleansing/task/'+tid)
              const sd = await sr.json()
              if (sd.status==='done') { clearInterval(poll); setResult(sd.result); await loadTemplates(); setStep(3) }
              else if (sd.status==='error') { clearInterval(poll); alert('失败: '+(sd.error||'未知')); setBusy('') }
            } catch(e) { clearInterval(poll); setBusy('') }
          }, 1000)
        } catch(e) { alert('网络错误: '+e.message); setBusy('') }
      }

      // 重置
      const reset = () => { setStep(0); setFile(null); setColumns([]); setPreview(null); setResult(null); setTemplateName('') }

      const mappedCount = Object.values(mapping).filter(v => v.target).length

      return <div>
        {/* 步骤指示 */}
        <div className="step-indicator">
          {['上传文件', '字段映射', '预览确认', '完成'].map((label, i) => (
            <span key={i} className={`step${step === i ? ' active' : ''}${step > i ? ' done' : ''}`}>
              {step > i ? '✓ ' : ''}{label}
            </span>
          ))}
          {busy && <span className="step" style={{color:'#1d4ed8'}}>⏳ {busy}...</span>}
        </div>

        {/* 步骤0: 上传 */}
        {step === 0 && <div className="card" style={{textAlign:'center',padding:40}}>
          <div style={{fontSize:28,marginBottom:12,opacity:0.3}}>🧹</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>上传需要清洗的数据文件</div>
          <div className="small muted" style={{marginBottom:16}}>CSV / XLSX · 检测列名 → 映射字段 → 标准化写入</div>
          <label style={{display:'inline-block',padding:'10px 24px',background:'#1d4ed8',color:'#fff',borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:14}}>
            {busy === 'detect' ? '检测中...' : '选择文件'}
            <input type="file" accept=".csv,.xlsx" style={{display:'none'}} onChange={e => handleUpload(e.target.files?.[0])} />
          </label>
        </div>}

        {/* 步骤1: 字段映射 */}
        {step === 1 && <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div><span className="section-title" style={{marginBottom:0}}>字段映射</span>
                <span className="small muted" style={{marginLeft:8}}>{columns.length} 源字段 → {mappedCount}/{systemFields.length} 已映射</span>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <select value={targetType} onChange={e => switchTarget(e.target.value)}
                  style={{fontSize:12,border:'1px solid #e2e8f0',borderRadius:8,padding:'5px 10px'}}>
                  <option value="order">订单</option>
                  <option value="inventory">库存</option>
                </select>
                <button onClick={() => { setShowFieldForm(!showFieldForm); setNewFieldKey(''); setNewFieldLabel(''); setNewFieldType('string') }} style={{
                  fontSize:11, border:'1px solid #e2e8f0', borderRadius:8, padding:'5px 10px',
                  background: showFieldForm ? '#eff6ff' : '#fff', cursor:'pointer',
                  color:'#1d4ed8', whiteSpace:'nowrap'
                }}>{showFieldForm ? '✕ 关闭' : '＋自定义字段'}</button>
                {showFieldForm && <div style={{display:'flex',gap:6,alignItems:'center',padding:'6px 10px',background:'#f8fafc',borderRadius:8,border:'1px solid #e2e8f0'}}>
                  <input placeholder="字段名(key)" value={newFieldKey} onChange={e=>setNewFieldKey(e.target.value)}
                    style={{width:90,fontSize:11,padding:'4px 6px',border:'1px solid #e2e8f0',borderRadius:6}} />
                  <input placeholder="显示名称" value={newFieldLabel} onChange={e=>setNewFieldLabel(e.target.value)}
                    style={{width:80,fontSize:11,padding:'4px 6px',border:'1px solid #e2e8f0',borderRadius:6}} />
                  <select value={newFieldType} onChange={e=>setNewFieldType(e.target.value)}
                    style={{width:70,fontSize:11,padding:'4px',border:'1px solid #e2e8f0',borderRadius:6}}>
                    <option value="string">文本</option><option value="number">数值</option><option value="date">日期</option>
                  </select>
                  <button onClick={async () => {
                    if (!newFieldKey) return;
                    await fetch(API+'/api/cleansing/custom-fields/'+targetType, {
                      method:'POST', headers:{'Content-Type':'application/json'},
                      body: JSON.stringify({key:newFieldKey, label:newFieldLabel||newFieldKey, type:newFieldType})
                    }).then(r=>r.json()).then(() => { switchTarget(targetType); setShowFieldForm(false) });
                  }} style={{fontSize:11,padding:'4px 10px',background:'#1d4ed8',color:'#fff',border:'none',borderRadius:6,cursor:'pointer'}}>添加</button>
                </div>}
                {templates.length > 0 && <select onChange={e => { const t = templates.find(t => t.name === e.target.value); if (t) applyTemplate(t) }}
                  style={{fontSize:12,border:'1px solid #e2e8f0',borderRadius:8,padding:'5px 10px'}}>
                  <option value="">套用模板...</option>
                  {templates.map(t => <option key={t.name}>{t.name}</option>)}
                </select>}
              </div>
            </div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:8}}>
              每行左边是源文件列名（含样例值），下拉选择要映射到的系统字段
            </div>
            {columns.map(col => {
              const m = mapping[col.name] || { target:'', type:'string', format:'', default:'' }
              return <div key={col.name} className="mapping-row">
                <div className="mapping-src">
                  <div>{col.name}</div>
                  <div className="small muted mono" style={{fontSize:10}}>{col.samples?.join(' · ') || '-'}</div>
                </div>
                <div className="mapping-arrow">→</div>
                <div className="mapping-dst">
                  <select value={m.target} onChange={e => updateMapping(col.name, 'target', e.target.value)}>
                    <option value="">— 忽略 —</option>
                    {systemFields.map(f => <option key={f.key} value={f.key}>{f.label} ({f.key})</option>)}
                  </select>
                </div>
                <div className="mapping-type">
                  <select value={m.type} onChange={e => updateMapping(col.name, 'type', e.target.value)}>
                    <option value="string">文本</option>
                    <option value="number">数值</option>
                    <option value="date">日期</option>
                  </select>
                </div>
              </div>
            })}
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="menu-btn" style={{color:'#64748b',background:'#fff',border:'1px solid #e2e8f0',padding:'6px 16px',borderRadius:8,cursor:'pointer',fontSize:13}} onClick={reset}>重新上传</button>
            <button disabled={mappedCount === 0} onClick={handlePreview}
              style={{padding:'8px 20px',background:mappedCount===0?'#94a3b8':'#1d4ed8',color:'#fff',border:'none',borderRadius:8,cursor:mappedCount===0?'not-allowed':'pointer',fontWeight:600,fontSize:13}}>
              {busy === 'preview' ? '预览中...' : `预览清洗结果 (${mappedCount} 字段)`}
            </button>
          </div>
        </div>}

        {/* 步骤2: 预览 */}
        {step === 2 && preview && <div>
          <div className="card" style={{marginBottom:12}}>
            <div className="section-title">清洗预览 · 前 {preview.preview?.length || 0} 行 · 共 {preview.total} 行</div>
            <div style={{overflowX:'auto'}}>
              <table><thead><tr>
                {preview.preview?.length > 0 && Object.keys(preview.preview[0]).filter(k => k !== '_source').map(k => <th key={k} style={{fontSize:11}}>{systemFields.find(f=>f.key===k)?.label||k}</th>)}
              </tr></thead>
              <tbody>{preview.preview?.map((row, i) => <tr key={i}>
                {Object.entries(row).filter(([k]) => k !== '_source').map(([k, v]) => <td key={k} className="small mono">{String(v || '')}</td>)}
              </tr>)}</tbody></table>
            </div>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input placeholder="保存为模板（可选）" value={templateName} onChange={e => setTemplateName(e.target.value)}
                style={{fontSize:12,border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 12px',width:200}} />
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={() => setStep(1)} style={{padding:'8px 16px',background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,cursor:'pointer',fontSize:13}}>返回修改</button>
              <button onClick={handleExecute} disabled={busy === 'exec'}
                style={{padding:'8px 20px',background:busy==='exec'?'#94a3b8':'#059669',color:'#fff',border:'none',borderRadius:8,cursor:busy==='exec'?'not-allowed':'pointer',fontWeight:600,fontSize:13}}>
                {busy === 'exec' ? '执行中...' : `确认写入 (${preview.total} 条)`}
              </button>
            </div>
          </div>
        </div>}

        {/* 步骤3: 完成 */}
        {step === 3 && result && <div className="card" style={{textAlign:'center',padding:40}}>
          <div style={{fontSize:32,marginBottom:8}}>{result.success > 0 ? '✅' : '⚠️'}</div>
          <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>{result.success > 0 ? '清洗完成' : '清洗完成（无新增）'}</div>
          <div className="small muted" style={{marginBottom:16}}>{result.message || `目标: ${result.target} · 文件: ${result.file}`}</div>
          <div style={{display:'flex',justifyContent:'center',gap:24,marginBottom:16}}>
            <div><div style={{fontSize:24,fontWeight:700,color:'#059669'}}>{result.success}</div><div className="small muted">成功</div></div>
            <div><div style={{fontSize:24,fontWeight:700,color:result.failed>0?'#e11d48':'#94a3b8'}}>{result.failed}</div><div className="small muted">跳过</div></div>
          </div>
          <button onClick={reset}
            style={{padding:'8px 20px',background:'#1d4ed8',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:13}}>
            继续清洗下一份文件
          </button>
        </div>}
      </div>
    }

    // ─── 建议页面 ──────────────────────────────────────────────────────────
    function InsightsPage() {
      const [tab, setTab] = useState('replen')
      const [replen, setReplen] = useState([]); const [purchase, setPurchase] = useState([])
      const [summary, setSummary] = useState(null); const [activities, setActivities] = useState([])
      const [slowMoving, setSlowMoving] = useState([])
      const [loading, setLoading] = useState(true)
      const load = async () => {
        try {
          const [r, p, s, ev, sm] = await Promise.all([
            fetch(API+'/api/insights/replenishment').then(r=>r.json()),
            fetch(API+'/api/insights/purchase').then(r=>r.json()),
            fetch(API+'/api/insights/summary').then(r=>r.json()),
            fetch(API+'/api/events').then(r=>r.json()),
            fetch(API+'/api/insights/slow-moving').then(r=>r.json()),
          ])
          setReplen(r); setPurchase(p.suggestions||p); setSummary(s); setActivities(ev.slice(0,15)); setSlowMoving(sm)
        } catch(e) {} finally { setLoading(false) }
      }
      useEffect(() => { load() }, [])

      const T = [
        { id:'replen',  label:'补货建议', count: replen.length },
        { id:'purchase', label:'采购建议', count: purchase.length },
        { id:'slow',     label:'滞销预警', count: slowMoving.filter(x=>x.level!=='正常').length },
        { id:'activity', label:'操作回溯', count: activities.length },
      ]

      if (loading) return <div className="card"><div className="muted">加载中...</div></div>
      return <>
        {/* 统计卡片 */}
        {summary && <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:12}}>
          <div className="card"><div className="small muted">库存商品</div><div style={{fontSize:20,fontWeight:700}}>{summary.total_products}</div></div>
          <div className="card"><div className="small muted">低库存</div><div style={{fontSize:20,fontWeight:700,color:'#f59e0b'}}>{summary.low_stock}</div></div>
          <div className="card"><div className="small muted">紧急补货</div><div style={{fontSize:20,fontWeight:700,color:summary.urgent_replenish>0?'#ef4444':'#059669'}}>{summary.urgent_replenish}</div></div>
          <div className="card"><div className="small muted">滞销</div><div style={{fontSize:20,fontWeight:700,color:summary.slow_moving>0?'#ef4444':'#059669'}}>{summary.slow_moving}</div></div>
          <div className="card"><div className="small muted">冷淡</div><div style={{fontSize:20,fontWeight:700,color:summary.cold_count>0?'#f59e0b':'#94a3b8'}}>{summary.cold_count}</div></div>
        </div>}
        {/* 标签页 */}
        <div style={{display:'flex',gap:0,marginBottom:12,background:'#fff',borderRadius:12,padding:4,border:'1px solid #f1f5f9'}}>
          {T.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1, padding:'10px 12px', fontSize:13, fontWeight:500, border:'none', borderRadius:10,
              background: tab===t.id ? '#1d4ed8' : 'transparent',
              color: tab===t.id ? '#fff' : '#64748b', cursor:'pointer', transition:'all 0.15s'
            }}>{t.label} {t.count>0 && `(${t.count})`}</button>
          ))}
        </div>
        {/* 补货建议 */}
        {tab === 'replen' && <div className="card">
          <div className="section-title">补货建议 {replen.length>0 && <span className="small muted">· 低于安全线的商品</span>}</div>
          {replen.length === 0 ? <div className="muted" style={{padding:12,textAlign:'center'}}>库存健康，暂无补货建议</div> : (
            <div style={{overflowX:'auto'}}>
              <table><thead><tr>{['SKU','商品','店铺','现有','安全线','在途','建议补','紧急度'].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>{replen.map((x,i)=><tr key={i}>
                <td className="mono" style={{fontSize:12}}>{x.sku}</td><td>{x.product_name}</td><td>{x.store}</td>
                <td style={{color:x.available_qty===0?'#ef4444':'#374151',fontWeight:600}}>{x.available_qty}</td>
                <td>{x.safety_qty}</td><td>{x.in_transit_qty}</td>
                <td style={{fontWeight:600,color:'#059669'}}>+{x.suggested_qty}</td>
                <td><span className={`pill ${x.urgency==='紧急'?'danger':x.urgency==='关注'?'warning':'info'}`}>{x.urgency}</span></td>
              </tr>)}</tbody></table>
            </div>
          )}
        </div>}
        {/* 采购建议 */}
        {tab === 'purchase' && <div className="card">
          <div className="section-title">采购建议 {purchase.length>0 && <span className="small muted">· 含供应商匹配</span>}</div>
          {purchase.length === 0 ? <div className="muted" style={{padding:12,textAlign:'center'}}>暂无采购建议</div> : (
            <div style={{overflowX:'auto'}}>
              <table><thead><tr>{['SKU','商品','建议补量','推荐供应商','评分','紧急度'].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>{purchase.map((x,i)=><tr key={i}>
                <td className="mono" style={{fontSize:12}}>{x.sku}</td><td>{x.product_name}</td>
                <td style={{fontWeight:600,color:'#059669'}}>+{x.suggested_qty}</td>
                <td>{x.supplier_name || '-'}</td>
                <td><span className={`pill ${x.supplier_score>=80?'success':x.supplier_score>=60?'warning':'danger'}`}>{x.supplier_score}</span></td>
                <td><span className={`pill ${x.urgency==='紧急'?'danger':x.urgency==='关注'?'warning':'info'}`}>{x.urgency}</span></td>
              </tr>)}</tbody></table>
            </div>
          )}
        </div>}
        {/* 滞销预警 */}
        {tab === 'slow' && <div className="card">
          <div className="section-title">滞销预警 {slowMoving.filter(x=>x.level!=='正常').length > 0 && <span className="small muted">· 超过 14 天未下单的商品</span>}</div>
          {slowMoving.length === 0 ? <div className="muted" style={{padding:12,textAlign:'center'}}>暂无数据</div> : (
            <div style={{overflowX:'auto'}}>
              <table><thead><tr>{['SKU','商品','店铺','分类','最近下单','天数','库存','状态'].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>{slowMoving.filter(x=>x.level!=='正常').map((x,i)=><tr key={i}>
                <td className="mono" style={{fontSize:12}}>{x.sku}</td>
                <td>{x.product_name}</td><td>{x.store}</td><td>{x.category}</td>
                <td style={{fontSize:12,color:'#64748b'}}>{x.last_order_date}</td>
                <td style={{fontWeight:600,color:x.days_since_last_order>=90?'#ef4444':x.days_since_last_order>=30?'#f59e0b':'#64748b'}}>{x.days_since_last_order}天</td>
                <td>{x.available_qty}</td>
                <td><span className={`pill ${x.level==='滞销'?'danger':x.level==='冷淡'?'warning':'info'}`}>{x.level}</span></td>
              </tr>)}</tbody></table>
            </div>
          )}
          {slowMoving.filter(x=>x.level==='正常').length > 0 && <div className="small muted" style={{marginTop:8,padding:'8px 0',borderTop:'1px solid #f1f5f9'}}>
            另有 {slowMoving.filter(x=>x.level==='正常').length} 个商品最近 14 天内有过订单（正常销售中）
          </div>}
        </div>}
        {tab === 'activity' && <div className="card">
          <div className="section-title">操作回溯 <span className="small muted">· 最近操作记录</span></div>
          {activities.length === 0 ? <div className="muted" style={{padding:12,textAlign:'center'}}>暂无操作记录</div> : (
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {activities.map((x,i)=><div key={i} style={{fontSize:12,padding:'8px 12px',background:'#f8fafc',border:'1px solid #f1f5f9',borderRadius:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span><span className={`pill ${x.level==='error'?'danger':x.level==='warning'?'warning':'info'}`} style={{fontSize:10,marginRight:8}}>{x.event_type}</span>{x.title}</span>
                <span className="small muted">{x.created_at?.slice(0,16).replace('T',' ')||''}</span>
              </div>)}
            </div>
          )}
        </div>}
      </>
    }

    // ─── 商品页面 ───────────────────────────────────────────────────────────
    function ProductPage() {
      const [list, setList] = useState([]); const [loading, setLoading] = useState(true)
      useEffect(() => { fetch(API+'/api/products').then(r=>r.json()).then(d=>{setList(d.items||d);setLoading(false)}).catch(()=>setLoading(false)) }, [])
      if (loading) return <div className="card"><div className="muted">加载中...</div></div>
      return <div className="card"><div className="section-title">商品管理 <span className="small muted" style={{marginLeft:8}}>共 {list.length} 个</span></div>
        <div style={{overflowX:'auto'}}><table><thead><tr>{['SKU','名称','店铺','分类','单价','状态'].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{list.length===0?<tr><td colSpan={6} style={{textAlign:'center',color:'#94a3b8',padding:20}}>暂无商品</td></tr>:list.map(x=><tr key={x.id}><td className="mono" style={{fontSize:12}}>{x.sku}</td><td>{x.product_name}</td><td>{x.store}</td><td>{x.category}</td><td>¥{x.price}</td><td><span className={`pill ${x.status==='active'?'success':'warning'}`}>{x.status}</span></td></tr>)}</tbody></table></div></div>
    }

    function SupplierPage() {
      const [list, setList] = useState([]); const [loading, setLoading] = useState(true)
      useEffect(() => { fetch(API+'/api/suppliers').then(r=>r.json()).then(d=>{setList(d.items||d);setLoading(false)}).catch(()=>setLoading(false)) }, [])
      if (loading) return <div className="card"><div className="muted">加载中...</div></div>

        <tbody>{list.length===0?<tr><td colSpan={6} style={{textAlign:'center',color:'#94a3b8',padding:20}}>暂无供应商</td></tr>:list.map(x=><tr key={x.id}><td className="mono" style={{fontSize:12}}>{x.supplier_code}</td><td>{x.supplier_name}</td><td>{x.contact_person}</td><td>{x.contact_phone||'-'}</td><td><span className={`pill ${x.score>=80?'success':x.score>=60?'warning':'danger'}`}>{x.score}</span></td><td><span className={`pill ${x.status==='active'?'success':'warning'}`}>{x.status}</span></td></tr>)}</tbody></table></div></div>

    // ─── 主应用 ─────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState('dash')
      const [sidebarOpen, setSidebarOpen] = useState(false)
      const [periodTab, setPeriodTab] = useState('month')
      const [dashboard, setDashboard] = useState(null)
      const [orders, setOrders] = useState([]); const [orderTotal, setOrderTotal] = useState(0); const [orderPage, setOrderPage] = useState(1)
      const [inventory, setInventory] = useState([])
      const [qualityLogs, setQualityLogs] = useState([])
      const [alerts, setAlerts] = useState([])
      const [events, setEvents] = useState([])
      const [syncTasks, setSyncTasks] = useState([])
      const [wsStatus, setWsStatus] = useState('idle')
      const [logs, setLogs] = useState([])
      const [busy, setBusy] = useState('')

      const loadAll = async () => {
        const safeFetch = async (url, fallback=[]) => {
          try { const r = await fetch(url); return await r.json() }
          catch(e) { console.warn('fetch failed:', url, e); return fallback }
        }
        try {
          const [d, o, i, q, a, e, s] = await Promise.all([
            safeFetch(API+'/api/dashboard/summary', {}),
            safeFetch(API+'/api/orders?page='+orderPage+'&page_size=8', {items:[],total:0,page:1}),
            safeFetch(API+'/api/inventory', []),
            safeFetch(API+'/api/quality-logs', []),
            safeFetch(API+'/api/alerts', []),
            safeFetch(API+'/api/events', []),
            safeFetch(API+'/api/sync-tasks', []),
          ])
          setOrders(o.items||o);
          setOrderTotal(o.total||(o||[]).length);
          setOrderPage(o.page||1);
          setDashboard(d);
          setInventory(i.items||i);
          setQualityLogs(q);
          setAlerts(a);
          setEvents(e);
          setSyncTasks(s)
        } catch(e) { console.error(e) }
      }

      const loadAllRef = useRef(loadAll)
      loadAllRef.current = loadAll
      const loadLatest = () => loadAllRef.current()

      useEffect(() => {
        loadLatest()
        const ws = new WebSocket('wss://overtrees.pythonanywhere.com/ws/events')
        ws.onopen = () => { setWsStatus('connected'); ws.send('ping') }
        ws.onclose = () => setWsStatus('closed')
        ws.onerror = () => setWsStatus('error')
        ws.onmessage = async (e) => {
          try {
            const data = JSON.parse(e.data)
            if (data.type === 'order.created' || data.type === 'inventory.changed' || data.type === 'order.imported' || data.type === 'data.cleaned') {
              await loadLatest()
            }
          } catch (_) {}
        }
        const poll = setInterval(loadLatest, 20000)
        return () => { ws.close(); clearInterval(poll) }
      }, [])

      const upload = async (type, file) => {
        if (!file) return
        const form = new FormData(); form.append('file', file)
        setBusy(type)
        try {
          const res = await fetch(API+(type==='orders'?'/api/orders/import':'/api/inventory/import'),{method:'POST',body:form})
          const result = await res.json()
          setLogs(prev=>[{type:type==='orders'?'orders.imported':'inventory.imported',payload:result,file:file.name},...prev].slice(0,20))
          await loadAll()
        } finally { setBusy('') }
      }

      const trendOption = useMemo(() => ({
        tooltip:{trigger:'axis'}, xAxis:{type:'category',data:dashboard?.trend?.map(i=>i['日期'])||[]}, yAxis:{type:'value'},
        series:[{type:'line',smooth:true,areaStyle:{opacity:.15},data:dashboard?.trend?.map(i=>i['GMV'])||[],color:'#1d4ed8'}], grid:{left:40,right:20,top:30,bottom:30}
      }), [dashboard])

      const storeOption = useMemo(() => ({
        tooltip:{trigger:'axis'}, xAxis:{type:'category',data:dashboard?.stores?.map(i=>i.name)||[]}, yAxis:{type:'value'},
        series:[{type:'bar',data:dashboard?.stores?.map(i=>i.gmv)||[],itemStyle:{color:'#0f766e',borderRadius:[6,6,0,0]}}], grid:{left:40,right:20,top:30,bottom:30}
      }), [dashboard])

      const lowStock = (inventory||[]).filter(x=>Number(x.available_qty)<Number(x.safety_qty)).length
      const errCount = (qualityLogs||[]).length

      const periodLabel = {today:'今日',week:'本周',month:'本月'}
      const periodTrend = dashboard?.periods?.[periodTab+'_trend'] || dashboard?.trend || []
      const periodMeta = dashboard?.periods?.[periodTab] || {}
      const periodTrendOption = useMemo(() => ({
        tooltip:{trigger:'axis'}, xAxis:{type:'category',data:periodTrend.map(i=>i['日期'])||[]},
        yAxis:{type:'value'}, grid:{left:40,right:20,top:30,bottom:30},
        series:[
          {type:'line',smooth:true,areaStyle:{opacity:.15},data:periodTrend.map(i=>i['GMV'])||[],color:'#1d4ed8',name:'GMV'},
          {type:'bar',data:periodTrend.map(i=>i['订单数'])||[],color:'#0f766e',yAxisIndex:1,name:'订单数'}
        ], legend:{data:['GMV','订单数'],bottom:0,left:'center',icon:'circle',itemWidth:8}
      }), [periodTrend])

      const funnelOption = useMemo(() => {
        const f = dashboard?.funnel || []
        return { tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},
          series:[{type:'funnel',left:'10%',top:20,bottom:40,width:'80%',minSize:'20%',maxSize:'100%',
            sort:'descending',gap:4,label:{show:true,fontSize:11,formatter:'{b}\n{c}单\n转化率{d}%'},
            itemStyle:{borderColor:'#fff',borderWidth:1},
            data:f.map((x,i)=>({...x,value:x.value,itemStyle:{color:['#3b82f6','#06b6d4','#0ea5e9','#14b8a6','#10b981'][i%5]}}))
          }]
        }
      }, [dashboard])

      return <>
        <Sidebar open={sidebarOpen} onClose={()=>setSidebarOpen(false)} page={page} onNavigate={setPage} lowStock={lowStock} errCount={errCount} />
        <div>
          <div className="header" style={{padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'relative',zIndex:1}}>
            <div style={{display:'flex',alignItems:'center'}}>
              <button className="menu-btn" onClick={()=>setSidebarOpen(true)}>☰</button>
              <div>
                <div style={{fontSize:20,fontWeight:800,lineHeight:1.3}}>SupplyChain V1 Preview</div>
                <div className="small muted">CSV / XLSX 导入 · 实时看板 · 低库存告警 · 字段清洗</div>
              </div>
            </div>
            <div className="small" style={{color:wsStatus==='connected'?'#86efac':wsStatus==='closed'?'#fcd34d':'#f87171'}}>WS: {wsStatus==='connected'?'实时':wsStatus==='closed'?'轮询':'断开'}</div>
          </div>
          <div className="wrap">
            {page === 'dash' && <>
              {/* 时段切换条 */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{display:'flex',gap:4}}>
                  {['today','week','month'].map(k => (
                    <button key={k} onClick={()=>setPeriodTab(k)}
                      style={{fontSize:12,padding:'4px 14px',borderRadius:99,border:'1px solid',cursor:'pointer',
                        background:periodTab===k?'#1d4ed8':'#fff',color:periodTab===k?'#fff':'#64748b',
                        borderColor:periodTab===k?'#1d4ed8':'#e2e8f0',fontWeight:periodTab===k?600:400}}>{periodLabel[k]}</button>
                  ))}
                </div>
                <div className="small muted">{periodMeta.date ? `截至 ${periodMeta.date}` : ''}</div>
              </div>
              {/* KPI 卡片 */}
              <div className="grid4" style={{marginBottom:16}}>
                <Card title={`${periodLabel[periodTab]} GMV`} value={`¥${Number(periodMeta.gmv||0).toLocaleString()}`} sub={`${periodMeta.orders||0} 单 / 总额 ¥${Number(dashboard?.summary?.gmv||0).toLocaleString()}`} />
                <Card title="待发货" value={dashboard?.summary?.pending_count||0} badge={dashboard?.summary?.pending_count>3?<span className="pill danger">积压</span>:null} />
                <Card title="库存健康度" value={`${dashboard?.health_index?.score||0}分`}
                  sub={`${dashboard?.health_index?.healthy||0}健康 / ${dashboard?.health_index?.warning||0}偏低 / ${dashboard?.health_index?.out_of_stock||0}缺货`}
                  badge={<span className={`pill ${dashboard?.health_index?.level==='danger'?'danger':dashboard?.health_index?.level==='warning'?'warning':'success'}`}>
                    {dashboard?.health_index?.level==='danger'?'危险':dashboard?.health_index?.level==='warning'?'关注':'良好'}</span>} />
                <Card title={errCount>0||dashboard?.summary?.active_alerts>0?'⚠️ 待处理异常':'待处理异常'}
                  value={(errCount + (dashboard?.summary?.active_alerts||0)).toString()}
                  sub={`${dashboard?.summary?.active_alerts||0} 告警 · ${errCount||0} 数据异常`}
                  badge={errCount>0||dashboard?.summary?.active_alerts>0?<span className="pill danger" style={{background:'#ef4444',color:'#fff'}}>需处理</span>:null} />
              </div>
              {/* 图表行：趋势 + 漏斗 */}
              <div className="grid2" style={{marginBottom:16}}>
                <div className="card"><div className="section-title">{periodLabel[periodTab]} GMV·订单趋势</div>
                  <Chart option={periodTrendOption} height={200} /></div>
                <div className="card"><div className="section-title">订单漏斗 下单→完成</div>
                  <Chart option={funnelOption} height={200} /></div>
              </div>
              {/* 分布 + 告警 */}
              <div className="grid3" style={{marginBottom:16}}>
                <div className="card"><div className="section-title">店铺 GMV</div><Chart option={storeOption} height={170} /></div>
                <div className="card"><div className="section-title">商品分类分布</div>
                  {dashboard?.category_distribution ? <Chart option={{tooltip:{trigger:'item'},series:[{type:'pie',radius:['40%','70%'],data:dashboard.category_distribution,label:{fontSize:11}}]}} height={170} /> : <div className="small muted">暂无数据</div>}
                </div>
                <div className="card"><div className="section-title">低库存 & 补货告警</div>
                  {alerts.length===0?<div className="small muted" style={{padding:12,textAlign:'center'}}>暂无告警</div>:alerts.slice(0,6).map(x=><div key={x.id} style={{padding:'6px 0',borderBottom:'1px solid #f1f5f9',fontSize:13}}>
                    <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                      <span style={{fontWeight:600,fontSize:12}}>{x.title}</span>
                      <span className={`pill ${x.alert_type==='replenish'||x.severity==='error'?'danger':x.severity==='warning'?'warning':'info'}`}>{x.alert_type==='replenish'?'补货':x.severity}</span>
                    </div>
                    <div className="small muted" style={{fontSize:11}}>{x.description}</div>
                  </div>)}
                  {alerts.length>6 && <div className="small muted" style={{textAlign:'center',padding:6}}>还有 {alerts.length-6} 条...</div>}
                </div>
              </div>
            </>}
            {page === 'insights' && <InsightsPage />}
            {page === 'products' && <ProductPage />}
            {page === 'suppliers' && <SupplierPage />}
            {page === 'orders' && <div className="card"><div className="section-title" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>订单 <span className="small muted">共 {orderTotal} 条</span></span>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <button onClick={()=>{setOrderPage(Math.max(1,orderPage-1));setTimeout(loadLatest,0)}} disabled={orderPage<=1}
                  style={{fontSize:11,padding:'4px 10px',border:'1px solid #e2e8f0',borderRadius:6,background:orderPage<=1?'#f1f5f9':'#fff',cursor:orderPage<=1?'not-allowed':'pointer'}}>‹ 上一页</button>
                <span className="small muted" style={{fontSize:12}}>{orderPage}</span>
                <button onClick={()=>{setOrderPage(orderPage+1);setTimeout(loadLatest,0)}}
                  style={{fontSize:11,padding:'4px 10px',border:'1px solid #e2e8f0',borderRadius:6,background:'#fff',cursor:'pointer'}}>下一页 ›</button>
              </div>
            </div><div style={{overflowX:'auto'}}><table><thead><tr>{['订单号','店铺','仓库','商品','金额','状态','日期'].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{orders.map(x=><tr key={x.id}><td className="mono" style={{fontSize:12}}>{x.order_no}</td><td>{x.store||'-'}</td><td>{x.warehouse||'-'}</td><td>{x.product_name}</td><td>¥{Number(x.total_amount).toLocaleString()}</td><td>{x.order_status}</td><td>{x.ordered_at}</td></tr>)}</tbody></table></div></div>}
            {page === 'inv' && <div className="card"><div className="section-title">库存</div><div style={{overflowX:'auto'}}><table><thead><tr>{['店铺','仓库','SKU','商品','可用','锁定','在途','安全线'].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{inventory.map(x=><tr key={x.id}><td>{x.store||'-'}</td><td>{x.warehouse||'-'}</td><td className="mono" style={{fontSize:12}}>{x.sku}</td><td>{x.product_name}</td><td>{x.available_qty}</td><td>{x.locked_qty}</td><td>{x.in_transit_qty}</td><td>{x.safety_qty}</td></tr>)}</tbody></table></div></div>}
            {page === 'cleansing' && <CleansingPage />}
            {page === 'import' && <div className="card" style={{marginBottom:16}}>
              <div className="section-title">导入与实时刷新</div>
              <div className="grid22" style={{marginBottom:12}}>
                <label style={{border:'1px dashed #cbd5e1',borderRadius:12,padding:16,cursor:'pointer'}}>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>导入订单 CSV / XLSX</div>
                  <div className="small muted">{busy==='orders'?'上传中...':'支持中文列名与英文字段名'}</div>
                  <input type="file" accept=".csv,.xlsx" style={{display:'none'}} onChange={e=>upload('orders',e.target.files?.[0])} />
                </label>
                <label style={{border:'1px dashed #cbd5e1',borderRadius:12,padding:16,cursor:'pointer'}}>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>导入库存 CSV / XLSX</div>
                  <div className="small muted">{busy==='inventory'?'上传中...':'导入后自动重建低库存告警'}</div>
                  <input type="file" accept=".csv,.xlsx" style={{display:'none'}} onChange={e=>upload('inventory',e.target.files?.[0])} />
                </label>
              </div>
              <div><div style={{fontSize:13,fontWeight:700,marginBottom:8}}>实时导入日志</div>{logs.length===0?<div className="small muted">暂无日志</div>:logs.map((x,idx)=><div key={idx} style={{fontSize:12,background:'#f8fafc',border:'1px solid #e5e7eb',borderRadius:10,padding:'8px 10px',marginBottom:8}}><div style={{fontWeight:700}}>{x.type}</div><div className="muted">{JSON.stringify(x.payload)}</div></div>)}</div>
            </div>}
            {page === 'quality' && <div className="card"><div className="section-title">数据质量日志</div>{qualityLogs.length===0?<div className="small muted">暂无异常</div>:<table><thead><tr>{['类型','字段','消息','级别','时间'].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{qualityLogs.map(x=><tr key={x.id}><td>{x.issue_type}</td><td>{x.field_name||'-'}</td><td>{x.issue_message}</td><td><span className={`pill ${levelClass(x.severity)}`}>{x.severity}</span></td><td className="small mono">{x.created_at||'-'}</td></tr>)}</tbody></table>}</div>}
          </div>
        </div>
      </>
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
